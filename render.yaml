# Render blueprint to deploy the Spring Boot API with managed Postgres

databases:
  - name: marketdata-db
    databaseName: marketdata
    plan: free

services:
  - type: web
    name: marketdata-api
    env: image
    plan: free
    buildCommand: ./mvnw -DskipTests package
    startCommand: java -Dserver.port=$PORT -jar target/marketdata-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: marketdata-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: marketdata-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: marketdata-db
          property: password
      - key: SPRING_FLYWAY_URL
        fromDatabase:
          name: marketdata-db
          property: connectionString
      - key: SPRING_FLYWAY_USER
        fromDatabase:
          name: marketdata-db
          property: user
      - key: SPRING_FLYWAY_PASSWORD
        fromDatabase:
          name: marketdata-db
          property: password
      - key: ALPHAVANTAGE_API_KEY
        sync: false # set in Render dashboard/CLI
