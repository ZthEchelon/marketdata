server:
  port: 8080

marketdata:
  alphavantage:
    base-url: https://www.alphavantage.co
    api-key: ${ALPHAVANTAGE_API_KEY:}
    outputsize: compact

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/marketdata}
    username: ${SPRING_DATASOURCE_USERNAME:marketdata}
    password: ${SPRING_DATASOURCE_PASSWORD:marketdata}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/marketdata}}
    user: ${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME:marketdata}}
    password: ${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD:marketdata}}
    locations: classpath:db/migration

logging:
  file:
    name: logs/marketdata.log
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
