server:
  port: 8080

marketdata:
  alphavantage:
    base-url: https://www.alphavantage.co
    api-key: ${ALPHAVANTAGE_API_KEY:}
    outputsize: compact

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/marketdata
    username: marketdata
    password: marketdata
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  file:
    name: logs/marketdata.log
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
