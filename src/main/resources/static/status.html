<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — System Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f4f6fb; --surface:#fff; --surface-alt:#f8fafc; --text:#0b1220; --muted:#5f6b85; --border:#e2e8f0; --primary:#2563eb; --primary-strong:#1d4ed8; --accent:#14b8a6; --accent-strong:#0ea5e9; --danger:#ef4444; --shadow:0 18px 40px rgba(15,23,42,.08);} *{box-sizing:border-box;} body{margin:0;font-family:"Plus Jakarta Sans","Manrope",system-ui,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(900px 420px at 5% -10%, rgba(37,99,235,.22), transparent 60%),radial-gradient(900px 420px at 95% 0%, rgba(20,184,166,.18), transparent 60%),var(--bg);} header{position:sticky;top:0;z-index:10;backdrop-filter:blur(14px);background:rgba(244,246,251,.92);border-bottom:1px solid var(--border);} .nav{max-width:1180px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;} .brand{display:flex;align-items:center;gap:12px;font-weight:700;} .logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent-strong));display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;box-shadow:0 12px 26px rgba(37,99,235,.22);} .nav-links{display:flex;gap:12px;flex-wrap:wrap;} .nav-links a{text-decoration:none;color:var(--muted);font-weight:600;padding:8px 12px;border-radius:999px;} .nav-links a:hover{color:var(--text);background:rgba(37,99,235,.08);} main{max-width:1180px;margin:0 auto;padding:28px 24px 80px;display:grid;gap:18px;} .hero{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(20,184,166,.08));border-radius:22px;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);} .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow);} .status{margin-top:8px;color:var(--muted);font-size:13px;} .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--surface-alt);border:1px solid var(--border);font-weight:600;} .good{color:var(--accent);} .bad{color:var(--danger);} .button{border:none;border-radius:12px;padding:12px 16px;background:linear-gradient(135deg,var(--primary-strong),var(--primary));color:#fff;font-weight:700;cursor:pointer;} .button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);} 
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><div class="logo">ML</div>MarketLens</div>
      <div class="nav-links">
        <a href="/">Workspace</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
        <a href="/runs.html">Runs</a>
        <a href="/quality.html">Quality</a>
        <a href="/actions.html">Actions</a>
        <a href="/calendar.html">Calendar</a>
        <a href="/keys.html">Keys</a>
        <a href="/status.html">Status</a>
      </div>
      <button id="access-key-btn" class="button secondary">Set API Key</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>System status</h1>
      <p>Quick health check for API and quotas.</p>
    </section>

    <section class="card">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <button id="refresh-btn" class="button">Refresh</button>
        <span class="pill" id="health-pill">Checking…</span>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <h3>Latest run</h3>
      <div class="status" id="latest-run"></div>
    </section>

    <section class="card">
      <h3>Quota</h3>
      <div class="status" id="quota"></div>
      <button id="quota-btn" class="button secondary">Refresh quota</button>
    </section>
  </main>

  <script>
    const accessKeyBtn = document.getElementById('access-key-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const quotaBtn = document.getElementById('quota-btn');
    const statusEl = document.getElementById('status');
    const healthPill = document.getElementById('health-pill');
    const quotaEl = document.getElementById('quota');
    const latestRunEl = document.getElementById('latest-run');

    let accessKey = localStorage.getItem('marketlens_api_key') || '';
    const api = (path, opts = {}) => fetch(path, {
      headers: {
        'Content-Type': 'application/json',
        ...(accessKey ? { 'X-API-Key': accessKey } : {})
      },
      ...opts
    });

    const promptKey = () => {
      const next = prompt('Enter MarketLens API Key (default: change-me-user)', accessKey || '');
      if (next === null) return false;
      accessKey = next.trim();
      if (accessKey) localStorage.setItem('marketlens_api_key', accessKey);
      else localStorage.removeItem('marketlens_api_key');
      return true;
    };

    const setStatus = (msg) => statusEl.textContent = msg || '';

    accessKeyBtn.addEventListener('click', promptKey);

    async function refreshHealth() {
      try {
        const res = await api('/api/v1/health');
        if (res.ok) {
          healthPill.textContent = 'API OK';
          healthPill.className = 'pill good';
        } else {
          healthPill.textContent = 'API Degraded';
          healthPill.className = 'pill bad';
        }
      } catch {
        healthPill.textContent = 'API Offline';
        healthPill.className = 'pill bad';
      }
    }

    async function refreshLatestRun() {
      try {
        const res = await api('/api/v1/ingestion/runs/latest');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const run = await res.json();
        latestRunEl.textContent = `Run ${run.id} • ${run.runType} • ${run.status} • ${run.symbolsProcessed}/${run.symbolsExpected}`;
      } catch {
        latestRunEl.textContent = 'No runs available.';
      }
    }

    async function refreshQuota() {
      if (!accessKey && !promptKey()) return;
      quotaEl.textContent = 'Loading quota...';
      try {
        const res = await api('/api/v1/admin/quota');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        quotaEl.textContent = `Remaining ${data.remaining}/${data.limit}`;
      } catch (err) {
        quotaEl.textContent = `Failed: ${err.message}`;
      }
    }

    refreshBtn.addEventListener('click', async () => {
      setStatus('Refreshing...');
      await refreshHealth();
      await refreshLatestRun();
      setStatus('');
    });
    quotaBtn.addEventListener('click', refreshQuota);

    refreshHealth();
    refreshLatestRun();
  </script>
</body>
</html>
