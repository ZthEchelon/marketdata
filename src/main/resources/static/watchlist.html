<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --text: #0b1220;
      --muted: #5f6b85;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --accent: #14b8a6;
      --danger: #ef4444;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(900px 420px at 5% -10%, rgba(37, 99, 235, 0.18), transparent 60%),
        radial-gradient(900px 420px at 95% 0%, rgba(20, 184, 166, 0.16), transparent 60%),
        var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: rgba(244, 246, 251, 0.92);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
    }
    .nav-links { display: flex; gap: 14px; flex-wrap: wrap; }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 150ms ease;
    }
    .nav-links a:hover {
      color: var(--text);
      border-color: rgba(37, 99, 235, 0.25);
      background: rgba(37, 99, 235, 0.08);
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; display: grid; gap: 18px; }
    .hero {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(20, 184, 166, 0.08));
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(24px, 2.6vw, 34px); }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    .button { border: none; border-radius: 12px; padding: 12px 16px; background: linear-gradient(135deg, var(--primary-strong), var(--primary)); color: #ffffff; font-weight: 700; cursor: pointer; font-family: "Manrope", sans-serif; }
    .button.secondary { background: #ffffff; color: var(--text); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-size: 13px; }
    td { font-family: "IBM Plex Mono", monospace; font-size: 13px; }
    .status { margin-top: 10px; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--danger); }
    @media (max-width: 640px) { main { padding: 16px; } }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <div class="logo">ML</div>
        MarketLens
      </div>
      <div class="nav-links">
        <a href="/">Workspace</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="access-key-btn" class="button secondary">Set API Key</button>
        <a class="button secondary" href="/">Back to workspace</a>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Watchlist snapshot</h1>
      <p>Scan the latest daily candles at a glance. Toggle active and inactive symbols to understand your coverage.</p>
    </section>
    <div class="card">
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;">
        <button id="refresh-btn" class="button">Refresh</button>
        <button id="toggle-btn" class="button secondary">Show Inactive</button>
      </div>
      <div class="status" id="status"></div>
      <div id="table-wrap"></div>
    </div>
  </main>

  <script>
    const refreshBtn = document.getElementById('refresh-btn');
    const toggleBtn = document.getElementById('toggle-btn');
    const statusEl = document.getElementById('status');
    const tableWrap = document.getElementById('table-wrap');
    const accessKeyBtn = document.getElementById('access-key-btn');
    let showInactive = false;

    let accessKey = localStorage.getItem('marketlens_api_key') || '';
    const api = (path, opts = {}) => fetch(path, {
      headers: {
        'Content-Type': 'application/json',
        ...(accessKey ? { 'X-API-Key': accessKey } : {})
      },
      ...opts
    });

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    function promptForKey() {
      const next = prompt('Enter MarketLens API Key (default: change-me-user)', accessKey || '');
      if (next === null) return false;
      accessKey = next.trim();
      if (accessKey) {
        localStorage.setItem('marketlens_api_key', accessKey);
      } else {
        localStorage.removeItem('marketlens_api_key');
      }
      return true;
    }

    accessKeyBtn.addEventListener('click', () => {
      promptForKey();
    });

    async function loadSummary(retry = true) {
      if (!accessKey) {
        setStatus('Set MarketLens API Key (default: change-me-user) to load data.', true);
        return;
      }
      setStatus('Loading...');
      refreshBtn.disabled = true;
      toggleBtn.disabled = true;
      try {
        const res = await api('/api/v1/market/summary?active=' + (!showInactive));
        if (res.status === 401 && retry) {
          const ok = promptForKey();
          if (ok) return await loadSummary(false);
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.length) {
          setStatus('No data available for ' + (showInactive ? 'inactive' : 'active') + ' symbols.');
          tableWrap.innerHTML = '';
          return;
        }
        renderTable(data);
        setStatus(`Updated ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
        tableWrap.innerHTML = '';
      } finally {
        refreshBtn.disabled = false;
        toggleBtn.disabled = false;
      }
    }

    function renderTable(data) {
      const rows = data.map(r => `
        <tr>
          <td>${r.symbol}</td>
          <td>${r.tradeDate}</td>
          <td>${Number(r.open).toFixed(2)}</td>
          <td>${Number(r.high).toFixed(2)}</td>
          <td>${Number(r.low).toFixed(2)}</td>
          <td>${Number(r.close).toFixed(2)}</td>
          <td>${r.volume.toLocaleString()}</td>
        </tr>
      `).join('');
      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Trade Date</th>
              <th>Open</th>
              <th>High</th>
              <th>Low</th>
              <th>Close</th>
              <th>Volume</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    refreshBtn.addEventListener('click', loadSummary);
    toggleBtn.addEventListener('click', () => {
      showInactive = !showInactive;
      toggleBtn.textContent = showInactive ? 'Show Active' : 'Show Inactive';
      loadSummary();
    });
    loadSummary();
  </script>
</body>
</html>
