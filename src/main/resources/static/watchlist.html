<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist Snapshot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #10b981;
      --muted: #94a3b8;
      --border: #1f2937;
      --text: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: radial-gradient(120% 120% at 0% 20%, #0b1326, #0f172a 45%, #0b1326 90%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .brand { font-weight: 600; letter-spacing: 0.03em; }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 12px; color: var(--muted); }
    button {
      border: none; border-radius: 10px; padding: 10px 12px;
      background: var(--accent); color: #052e16; font-weight: 600; cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-size: 13px; }
    td { font-family: "IBM Plex Mono", monospace; font-size: 13px; }
    .status { margin-top: 10px; color: var(--muted); }
    .status.error { color: #f87171; }
    @media (max-width: 640px) { header { padding: 16px; } main { padding: 16px; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">Watchlist Snapshot</div>
    <div><a href="/" style="color: var(--accent); text-decoration:none;">← Back to console</a></div>
  </header>
  <main>
    <div class="card">
      <h1>Latest Daily Candles</h1>
      <p>Shows the most recent trading day for each active watchlist symbol (last available candle). Toggle to view inactive symbols with stored data.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;">
        <button id="refresh-btn">Refresh</button>
        <button id="toggle-btn">Show Inactive</button>
      </div>
      <div class="status" id="status"></div>
      <div id="table-wrap"></div>
    </div>
  </main>

  <script>
    const refreshBtn = document.getElementById('refresh-btn');
    const toggleBtn = document.getElementById('toggle-btn');
    const statusEl = document.getElementById('status');
    const tableWrap = document.getElementById('table-wrap');
    let showInactive = false;

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    async function loadSummary() {
      setStatus('Loading...');
      refreshBtn.disabled = true;
      toggleBtn.disabled = true;
      try {
        const res = await fetch('/api/v1/market/summary?active=' + (!showInactive));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.length) {
          setStatus('No data available for ' + (showInactive ? 'inactive' : 'active') + ' symbols.');
          tableWrap.innerHTML = '';
          return;
        }
        renderTable(data);
        setStatus(`Updated ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
        tableWrap.innerHTML = '';
      } finally {
        refreshBtn.disabled = false;
        toggleBtn.disabled = false;
      }
    }

    function renderTable(data) {
      const rows = data.map(r => `
        <tr>
          <td>${r.symbol}</td>
          <td>${r.tradeDate}</td>
          <td>${Number(r.open).toFixed(2)}</td>
          <td>${Number(r.high).toFixed(2)}</td>
          <td>${Number(r.low).toFixed(2)}</td>
          <td>${Number(r.close).toFixed(2)}</td>
          <td>${r.volume.toLocaleString()}</td>
        </tr>
      `).join('');
      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Trade Date</th>
              <th>Open</th>
              <th>High</th>
              <th>Low</th>
              <th>Close</th>
              <th>Volume</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    refreshBtn.addEventListener('click', loadSummary);
    toggleBtn.addEventListener('click', () => {
      showInactive = !showInactive;
      toggleBtn.textContent = showInactive ? 'Show Active' : 'Show Inactive';
      loadSummary();
    });
    loadSummary();
  </script>
</body>
</html>
