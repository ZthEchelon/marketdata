<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --surface: #101833;
      --surface-soft: rgba(16, 24, 51, 0.7);
      --text: #eef2ff;
      --muted: #a1afc8;
      --border: rgba(148, 163, 184, 0.18);
      --brand: #6ee7ff;
      --brand-strong: #38bdf8;
      --accent: #22c55e;
      --danger: #f87171;
      --shadow: 0 24px 80px rgba(3, 7, 18, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 10% -10%, rgba(56, 189, 248, 0.25), transparent 60%),
        radial-gradient(900px 600px at 90% -20%, rgba(34, 197, 94, 0.18), transparent 60%),
        var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: rgba(11, 16, 32, 0.75);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8 0%, #22c55e 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #04101f;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.35);
    }
    .nav-links { display: flex; gap: 14px; flex-wrap: wrap; }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 150ms ease;
    }
    .nav-links a:hover {
      color: var(--text);
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.12);
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; display: grid; gap: 18px; }
    .hero {
      background: linear-gradient(145deg, rgba(16, 24, 51, 0.95), rgba(13, 23, 45, 0.6));
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(24px, 2.6vw, 34px); }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
    .card { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    .button { border: none; border-radius: 12px; padding: 12px 16px; background: linear-gradient(135deg, var(--brand-strong), var(--accent)); color: #04101f; font-weight: 700; cursor: pointer; font-family: "Manrope", sans-serif; }
    .button.secondary { background: rgba(15, 23, 42, 0.7); color: var(--text); border: 1px solid rgba(148, 163, 184, 0.25); }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid rgba(148, 163, 184, 0.15); text-align: left; }
    th { color: var(--muted); font-size: 13px; }
    td { font-family: "IBM Plex Mono", monospace; font-size: 13px; }
    .status { margin-top: 10px; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--danger); }
    @media (max-width: 640px) { main { padding: 16px; } }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <div class="logo">ML</div>
        MarketLens
      </div>
      <div class="nav-links">
        <a href="/">Pipeline</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
      </div>
      <a class="button secondary" href="/">Back to pipeline</a>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Watchlist snapshot</h1>
      <p>Track the latest daily candle for each symbol. Toggle active and inactive symbols to compare coverage across your stored data.</p>
    </section>
    <div class="card">
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;">
        <button id="refresh-btn" class="button">Refresh</button>
        <button id="toggle-btn" class="button secondary">Show Inactive</button>
      </div>
      <div class="status" id="status"></div>
      <div id="table-wrap"></div>
    </div>
  </main>

  <script>
    const refreshBtn = document.getElementById('refresh-btn');
    const toggleBtn = document.getElementById('toggle-btn');
    const statusEl = document.getElementById('status');
    const tableWrap = document.getElementById('table-wrap');
    let showInactive = false;

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    async function loadSummary() {
      setStatus('Loading...');
      refreshBtn.disabled = true;
      toggleBtn.disabled = true;
      try {
        const res = await fetch('/api/v1/market/summary?active=' + (!showInactive));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.length) {
          setStatus('No data available for ' + (showInactive ? 'inactive' : 'active') + ' symbols.');
          tableWrap.innerHTML = '';
          return;
        }
        renderTable(data);
        setStatus(`Updated ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
        tableWrap.innerHTML = '';
      } finally {
        refreshBtn.disabled = false;
        toggleBtn.disabled = false;
      }
    }

    function renderTable(data) {
      const rows = data.map(r => `
        <tr>
          <td>${r.symbol}</td>
          <td>${r.tradeDate}</td>
          <td>${Number(r.open).toFixed(2)}</td>
          <td>${Number(r.high).toFixed(2)}</td>
          <td>${Number(r.low).toFixed(2)}</td>
          <td>${Number(r.close).toFixed(2)}</td>
          <td>${r.volume.toLocaleString()}</td>
        </tr>
      `).join('');
      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Trade Date</th>
              <th>Open</th>
              <th>High</th>
              <th>Low</th>
              <th>Close</th>
              <th>Volume</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    refreshBtn.addEventListener('click', loadSummary);
    toggleBtn.addEventListener('click', () => {
      showInactive = !showInactive;
      toggleBtn.textContent = showInactive ? 'Show Active' : 'Show Inactive';
      loadSummary();
    });
    loadSummary();
  </script>
</body>
</html>
