<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — Actions & Adjusted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f4f6fb; --surface:#fff; --surface-alt:#f8fafc; --text:#0b1220; --muted:#5f6b85; --border:#e2e8f0; --primary:#2563eb; --primary-strong:#1d4ed8; --accent:#14b8a6; --accent-strong:#0ea5e9; --danger:#ef4444; --shadow:0 18px 40px rgba(15,23,42,.08); --glow:0 0 0 1px rgba(37,99,235,.1),0 20px 50px rgba(37,99,235,.18);} *{box-sizing:border-box;} body{margin:0;font-family:"Plus Jakarta Sans","Manrope",system-ui,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(900px 420px at 5% -10%, rgba(37,99,235,.22), transparent 60%),radial-gradient(900px 420px at 95% 0%, rgba(20,184,166,.18), transparent 60%),var(--bg);} header{position:sticky;top:0;z-index:10;backdrop-filter:blur(14px);background:rgba(244,246,251,.92);border-bottom:1px solid var(--border);} .nav{max-width:1180px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;} .brand{display:flex;align-items:center;gap:12px;font-weight:700;} .logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent-strong));display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;box-shadow:0 12px 26px rgba(37,99,235,.22);} .nav-links{display:flex;gap:12px;flex-wrap:wrap;} .nav-links a{text-decoration:none;color:var(--muted);font-weight:600;padding:8px 12px;border-radius:999px;} .nav-links a:hover{color:var(--text);background:rgba(37,99,235,.08);} main{max-width:1180px;margin:0 auto;padding:28px 24px 80px;display:grid;gap:18px;} .hero{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(20,184,166,.08));border-radius:22px;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);} .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow);} label{display:block;margin-bottom:6px;color:var(--muted);font-size:13px;font-weight:600;} input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);} .button{border:none;border-radius:12px;padding:12px 16px;background:linear-gradient(135deg,var(--primary-strong),var(--primary));color:#fff;font-weight:700;cursor:pointer;} .button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);} .status{margin-top:8px;color:var(--muted);font-size:13px;} .status.error{color:var(--danger);} table{width:100%;border-collapse:collapse;margin-top:12px;} th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;font-family:"IBM Plex Mono",monospace;font-size:12px;} th{color:var(--muted);} 
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><div class="logo">ML</div>MarketLens</div>
      <div class="nav-links">
        <a href="/">Workspace</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
        <a href="/runs.html">Runs</a>
        <a href="/quality.html">Quality</a>
        <a href="/actions.html">Actions</a>
        <a href="/calendar.html">Calendar</a>
        <a href="/keys.html">Keys</a>
        <a href="/status.html">Status</a>
      </div>
      <button id="access-key-btn" class="button secondary">Set API Key</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Corporate actions & adjusted prices</h1>
      <p>View splits/dividends and the adjusted series used for analytics.</p>
    </section>

    <section class="card">
      <div style="display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); align-items:end;">
        <div>
          <label for="symbol">Symbol</label>
          <input id="symbol" placeholder="e.g. MSFT">
        </div>
        <div>
          <label for="from">From</label>
          <input id="from" placeholder="YYYY-MM-DD" value="2024-01-01">
        </div>
        <div>
          <label for="to">To</label>
          <input id="to" placeholder="YYYY-MM-DD" value="2024-12-31">
        </div>
        <div>
          <button id="load-btn" class="button">Load</button>
        </div>
      </div>
      <div style="display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); align-items:end; margin-top:16px;">
        <div>
          <label for="action-date">Action date</label>
          <input id="action-date" placeholder="YYYY-MM-DD">
        </div>
        <div>
          <label for="action-type">Type</label>
          <input id="action-type" placeholder="SPLIT or DIVIDEND">
        </div>
        <div>
          <label for="split-factor">Split factor</label>
          <input id="split-factor" placeholder="e.g. 2.0">
        </div>
        <div>
          <label for="dividend">Dividend</label>
          <input id="dividend" placeholder="e.g. 0.50">
        </div>
        <div>
          <button id="add-action" class="button secondary">Add action</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div id="actions"></div>
      <div id="adjusted"></div>
    </section>
  </main>

  <script>
    const accessKeyBtn = document.getElementById('access-key-btn');
    const loadBtn = document.getElementById('load-btn');
    const statusEl = document.getElementById('status');
    const actionsEl = document.getElementById('actions');
    const adjustedEl = document.getElementById('adjusted');
    const symbol = document.getElementById('symbol');
    const from = document.getElementById('from');
    const to = document.getElementById('to');
    const actionDate = document.getElementById('action-date');
    const actionType = document.getElementById('action-type');
    const splitFactor = document.getElementById('split-factor');
    const dividend = document.getElementById('dividend');
    const addActionBtn = document.getElementById('add-action');

    let accessKey = localStorage.getItem('marketlens_api_key') || '';
    const api = (path, opts = {}) => fetch(path, {
      headers: {
        'Content-Type': 'application/json',
        ...(accessKey ? { 'X-API-Key': accessKey } : {})
      },
      ...opts
    });

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    const promptKey = () => {
      const next = prompt('Enter MarketLens API Key (default: change-me-user)', accessKey || '');
      if (next === null) return false;
      accessKey = next.trim();
      if (accessKey) localStorage.setItem('marketlens_api_key', accessKey);
      else localStorage.removeItem('marketlens_api_key');
      return true;
    };

    accessKeyBtn.addEventListener('click', promptKey);

    loadBtn.addEventListener('click', async () => {
      if (!accessKey && !promptKey()) return;
      if (!symbol.value.trim()) {
        setStatus('Enter a symbol.', true);
        return;
      }
      setStatus('Loading data...');
      try {
        const sym = symbol.value.trim().toUpperCase();
        const actionsRes = await api(`/api/v1/corporate-actions?symbol=${encodeURIComponent(sym)}`);
        const adjustedRes = await api(`/api/v1/market/adjusted?symbol=${encodeURIComponent(sym)}&from=${encodeURIComponent(from.value)}&to=${encodeURIComponent(to.value)}`);
        if (!actionsRes.ok) throw new Error(`Actions HTTP ${actionsRes.status}`);
        if (!adjustedRes.ok) throw new Error(`Adjusted HTTP ${adjustedRes.status}`);
        const actions = await actionsRes.json();
        const adjusted = await adjustedRes.json();
        actionsEl.innerHTML = actions.length ? `
          <h3>Corporate actions</h3>
          <table>
            <thead><tr><th>Date</th><th>Type</th><th>Factor</th><th>Note</th></tr></thead>
            <tbody>
              ${actions.map(a => `
                <tr>
                  <td>${a.actionDate}</td>
                  <td>${a.actionType}</td>
                  <td>${a.splitFactor ?? '-'}</td>
                  <td>${a.note ?? ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : '<div class="status">No corporate actions found.</div>';
        adjustedEl.innerHTML = adjusted.length ? `
          <h3>Adjusted prices</h3>
          <table>
            <thead><tr><th>Date</th><th>Close</th><th>Adj Close</th><th>Volume</th></tr></thead>
            <tbody>
              ${adjusted.map(a => `
                <tr>
                  <td>${a.tradeDate}</td>
                  <td>${Number(a.close).toFixed(2)}</td>
                  <td>${Number(a.adjustedClose).toFixed(2)}</td>
                  <td>${Number(a.volume).toLocaleString()}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : '<div class="status">No adjusted prices found.</div>';
        setStatus('Loaded.');
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
      }
    });

    addActionBtn.addEventListener('click', async () => {
      if (!accessKey && !promptKey()) return;
      const sym = symbol.value.trim().toUpperCase();
      if (!sym || !actionDate.value || !actionType.value) {
        return setStatus('Enter symbol, date, and type.', true);
      }
      setStatus('Saving corporate action...');
      try {
        const body = {
          symbol: sym,
          actionDate: actionDate.value,
          actionType: actionType.value.trim().toUpperCase(),
          splitFactor: splitFactor.value ? Number(splitFactor.value) : null,
          dividend: dividend.value ? Number(dividend.value) : null
        };
        const res = await api('/api/v1/corporate-actions', {
          method: 'POST',
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        setStatus('Action saved.');
        loadBtn.click();
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
      }
    });
  </script>
</body>
</html>
