<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — Indicators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --surface: #101833;
      --surface-soft: rgba(16, 24, 51, 0.7);
      --text: #eef2ff;
      --muted: #a1afc8;
      --border: rgba(148, 163, 184, 0.18);
      --brand: #6ee7ff;
      --brand-strong: #38bdf8;
      --accent: #22c55e;
      --danger: #f87171;
      --shadow: 0 24px 80px rgba(3, 7, 18, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 10% -10%, rgba(56, 189, 248, 0.25), transparent 60%),
        radial-gradient(900px 600px at 90% -20%, rgba(34, 197, 94, 0.18), transparent 60%),
        var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: rgba(11, 16, 32, 0.75);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8 0%, #22c55e 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #04101f;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.35);
    }
    .nav-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 150ms ease;
    }
    .nav-links a:hover {
      color: var(--text);
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.12);
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; display: grid; gap: 18px; }
    .hero {
      background: linear-gradient(145deg, rgba(16, 24, 51, 0.95), rgba(13, 23, 45, 0.6));
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(24px, 2.6vw, 34px); }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
    .card { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; font-weight: 600; }
    select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.25); background: rgba(5, 10, 24, 0.7); color: var(--text); font-size: 14px; font-family: "Manrope", sans-serif; }
    .button { border: none; border-radius: 12px; padding: 12px 16px; background: linear-gradient(135deg, var(--brand-strong), var(--accent)); color: #04101f; font-weight: 700; cursor: pointer; font-family: "Manrope", sans-serif; }
    .button.secondary { background: rgba(15, 23, 42, 0.7); color: var(--text); border: 1px solid rgba(148, 163, 184, 0.25); }
    .status { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--danger); }
    canvas { width: 100%; height: 260px; background: rgba(5, 10, 24, 0.7); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 14px; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid rgba(148, 163, 184, 0.15); font-family: "IBM Plex Mono", monospace; font-size: 12px; }
    th { color: var(--muted); text-align: left; }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <div class="logo">ML</div>
        MarketLens
      </div>
      <div class="nav-links">
        <a href="/">Pipeline</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
      </div>
      <a class="button secondary" href="/">Back to pipeline</a>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Indicator visualizer</h1>
      <p>Explore RSI and MACD trends for any stored symbol. Use this view to spot momentum shifts at a glance.</p>
    </section>
    <div class="card">
      <div style="display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); align-items:end;">
        <div>
          <label for="symbol-select">Symbol</label>
          <select id="symbol-select">
            <option value="">-- Select symbol --</option>
          </select>
        </div>
        <div>
          <button id="load-btn" class="button">Load indicators</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div class="status" id="quote"></div>
      <canvas id="rsi-canvas"></canvas>
      <canvas id="macd-canvas"></canvas>
      <div id="table-wrap"></div>
    </div>
  </main>

  <script>
    const symbolSelect = document.getElementById('symbol-select');
    const loadBtn = document.getElementById('load-btn');
    const statusEl = document.getElementById('status');
    const quoteEl = document.getElementById('quote');
    const rsiCanvas = document.getElementById('rsi-canvas');
    const macdCanvas = document.getElementById('macd-canvas');
    const tableWrap = document.getElementById('table-wrap');

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    async function loadSymbols() {
      try {
        const res = await fetch('/api/v1/market/summary?active=true');
        if (!res.ok) return;
        const data = await res.json();
        symbolSelect.innerHTML = '<option value="">-- Select symbol --</option>' +
          data.map(s => `<option value="${s.symbol}">${s.symbol} (${s.tradeDate})</option>`).join('');
      } catch (e) {
        // ignore
      }
    }

    function drawLine(canvas, points, color, label) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;
      ctx.clearRect(0,0,w,h);
      if (!points.length) return;
      const ys = points.map(p => p.y);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const spanY = maxY - minY || 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      points.forEach((p,i) => {
        const x = (i/(points.length-1)) * (w-20) + 10;
        const y = h - ((p.y - minY)/spanY) * (h-20) - 10;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = '12px Space Grotesk';
      ctx.fillText(label, 12, 16);
    }

    function drawMacd(points) {
      const ctx = macdCanvas.getContext('2d');
      const w = macdCanvas.width = macdCanvas.clientWidth;
      const h = macdCanvas.height = macdCanvas.clientHeight;
      ctx.clearRect(0,0,w,h);
      if (!points.length) return;
      const macdVals = points.map(p => p.macd);
      const signalVals = points.map(p => p.signal);
      const histVals = points.map(p => p.histogram);
      const all = macdVals.concat(signalVals).concat(histVals);
      const minY = Math.min(...all);
      const maxY = Math.max(...all);
      const spanY = maxY - minY || 1;

      // Histogram bars
      histVals.forEach((yVal, i) => {
        const x = (i/(points.length-1)) * (w-20) + 10;
        const y = h - ((yVal - minY)/spanY) * (h-20) - 10;
        const zeroY = h - ((0 - minY)/spanY) * (h-20) - 10;
        ctx.fillStyle = yVal >= 0 ? 'rgba(16,185,129,0.6)' : '#f87171';
        ctx.fillRect(x-3, Math.min(y, zeroY), 6, Math.abs(zeroY - y));
      });

      const toLinePoints = (vals) => vals.map((y,i) => ({y, i}));
      const plotLine = (vals, color) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        vals.forEach((yVal,i) => {
          const x = (i/(vals.length-1)) * (w-20) + 10;
          const y = h - ((yVal - minY)/spanY) * (h-20) - 10;
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
      };
      plotLine(macdVals, '#10b981');
      plotLine(signalVals, '#60a5fa');
      ctx.fillStyle = '#10b981';
      ctx.font = '12px Space Grotesk';
      ctx.fillText('MACD (green) / Signal (blue)', 12, 16);
    }

    function renderTable(data) {
      const rows = data.map(d => `
        <tr>
          <td>${d.tradeDate}</td>
          <td>${d.type}</td>
          <td>${Number(d.value).toFixed(4)}</td>
        </tr>
      `).join('');
      tableWrap.innerHTML = `
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Value</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadQuote(sym) {
      try {
        const res = await fetch(`/api/v1/market/summary?active=false`);
        const resActive = await fetch(`/api/v1/market/summary?active=true`);
        const dataInactive = res.ok ? await res.json() : [];
        const dataActive = resActive.ok ? await resActive.json() : [];
        const combined = [...dataActive, ...dataInactive];
        const row = combined.find(r => r.symbol === sym);
        if (row) {
          quoteEl.textContent = `Latest close (${row.tradeDate}): O ${Number(row.open).toFixed(2)} H ${Number(row.high).toFixed(2)} L ${Number(row.low).toFixed(2)} C ${Number(row.close).toFixed(2)} V ${row.volume.toLocaleString()}`;
          quoteEl.className = 'status';
        } else {
          quoteEl.textContent = '';
        }
      } catch {
        quoteEl.textContent = '';
      }
    }

    async function loadIndicators() {
      const sym = symbolSelect.value;
      if (!sym) {
        setStatus('Select a symbol.', true);
        return;
      }
      setStatus('Loading indicators...');
      loadBtn.disabled = true;
      try {
        await loadQuote(sym);
        const res = await fetch(`/api/v1/indicators/${encodeURIComponent(sym)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.length) {
          setStatus('No indicators found.', true);
          tableWrap.innerHTML = '';
          rsiCanvas.getContext('2d').clearRect(0,0,rsiCanvas.width,rsiCanvas.height);
          macdCanvas.getContext('2d').clearRect(0,0,macdCanvas.width,macdCanvas.height);
          return;
        }
        renderTable(data);
        const rsiPoints = data.filter(d => d.type === 'RSI_14').map((d,i) => ({y:Number(d.value), i}));
        drawLine(rsiCanvas, rsiPoints, '#10b981', 'RSI 14');
        const macdData = [];
        const byDate = {};
        data.forEach(d => {
          if (!byDate[d.tradeDate]) byDate[d.tradeDate] = {};
          byDate[d.tradeDate][d.type] = Number(d.value);
        });
        Object.entries(byDate).forEach(([,v]) => {
          if (v.MACD !== undefined && v.MACD_SIGNAL !== undefined && v.MACD_HISTOGRAM !== undefined) {
            macdData.push({macd:v.MACD, signal:v.MACD_SIGNAL, histogram:v.MACD_HISTOGRAM});
          }
        });
        drawMacd(macdData.slice(-120)); // plot recent
        setStatus(`Loaded ${data.length} rows for ${sym}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener('click', loadIndicators);
    loadSymbols();
  </script>
</body>
</html>
