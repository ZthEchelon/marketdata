<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketLens — Indicators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --text: #0b1220;
      --muted: #5f6b85;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --accent: #14b8a6;
      --accent-strong: #0ea5e9;
      --danger: #ef4444;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --glow: 0 0 0 1px rgba(37, 99, 235, 0.1), 0 20px 50px rgba(37, 99, 235, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Manrope", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(900px 420px at 5% -10%, rgba(37, 99, 235, 0.22), transparent 60%),
        radial-gradient(900px 420px at 95% 0%, rgba(20, 184, 166, 0.18), transparent 60%),
        var(--bg);
    }
    body::before {
      content: "";
      position: fixed;
      inset: -20% -10% auto -10%;
      height: 60vh;
      background: linear-gradient(120deg, rgba(37, 99, 235, 0.18), rgba(20, 184, 166, 0.14));
      filter: blur(60px);
      opacity: 0.6;
      animation: drift 14s ease-in-out infinite;
      z-index: -1;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: rgba(244, 246, 251, 0.92);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent-strong));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
      animation: pulse 4s ease-in-out infinite;
    }
    .nav-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 150ms ease;
    }
    .nav-links a:hover {
      color: var(--text);
      border-color: rgba(37, 99, 235, 0.25);
      background: rgba(37, 99, 235, 0.08);
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; display: grid; gap: 18px; }
    .hero {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(20, 184, 166, 0.08));
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(24px, 2.6vw, 34px); }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease; }
    .card:hover { transform: translateY(-2px); box-shadow: var(--glow); border-color: rgba(37, 99, 235, 0.2); }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; font-weight: 600; }
    select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #ffffff; color: var(--text); font-size: 14px; font-family: "Manrope", sans-serif; }
    .button { border: none; border-radius: 12px; padding: 12px 16px; background: linear-gradient(135deg, var(--primary-strong), var(--primary)); color: #ffffff; font-weight: 700; cursor: pointer; font-family: "Manrope", sans-serif; position: relative; overflow: hidden; }
    .button::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 45%); opacity: 0; transition: opacity 200ms ease; }
    .button:hover::after { opacity: 1; }
    .button.secondary { background: #ffffff; color: var(--text); border: 1px solid var(--border); }
    .status { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--danger); }
    canvas { width: 100%; height: 260px; background: #ffffff; border: 1px solid var(--border); border-radius: 14px; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: "IBM Plex Mono", monospace; font-size: 12px; }
    th { color: var(--muted); text-align: left; }
    @keyframes drift {
      0%, 100% { transform: translate3d(0,0,0); }
      50% { transform: translate3d(40px, 10px, 0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22); }
      50% { transform: scale(1.05); box-shadow: 0 18px 38px rgba(37, 99, 235, 0.32); }
    }
    @media (prefers-reduced-motion: reduce) {
      body::before, .logo { animation: none; }
      .card, .button { transition: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <div class="logo">ML</div>
        MarketLens
      </div>
      <div class="nav-links">
        <a href="/">Workspace</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/indicators.html">Indicators</a>
        <a href="/runs.html">Runs</a>
        <a href="/quality.html">Quality</a>
        <a href="/actions.html">Actions</a>
        <a href="/calendar.html">Calendar</a>
        <a href="/keys.html">Keys</a>
        <a href="/status.html">Status</a>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="access-key-btn" class="button secondary">Set API Key</button>
        <a class="button secondary" href="/">Back to workspace</a>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Indicator visualizer</h1>
      <p>Compare RSI and MACD trends quickly. This view keeps the most recent market context close while you scan momentum.</p>
    </section>
    <div class="card">
      <div style="display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); align-items:end;">
        <div>
          <label for="symbol-select">Symbol</label>
          <select id="symbol-select">
            <option value="">-- Select symbol --</option>
          </select>
        </div>
        <div>
          <button id="load-btn" class="button">Load indicators</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div class="status" id="quote"></div>
      <canvas id="rsi-canvas"></canvas>
      <canvas id="macd-canvas"></canvas>
      <div id="table-wrap"></div>
    </div>
  </main>

  <script>
    const symbolSelect = document.getElementById('symbol-select');
    const loadBtn = document.getElementById('load-btn');
    const statusEl = document.getElementById('status');
    const quoteEl = document.getElementById('quote');
    const rsiCanvas = document.getElementById('rsi-canvas');
    const macdCanvas = document.getElementById('macd-canvas');
    const tableWrap = document.getElementById('table-wrap');
    const accessKeyBtn = document.getElementById('access-key-btn');

    let accessKey = localStorage.getItem('marketlens_api_key') || '';
    const api = (path, opts = {}) => fetch(path, {
      headers: {
        'Content-Type': 'application/json',
        ...(accessKey ? { 'X-API-Key': accessKey } : {})
      },
      ...opts
    });

    const setStatus = (msg, isError=false) => {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isError ? ' error' : '');
    };

    accessKeyBtn.addEventListener('click', () => {
      const next = prompt('Enter MarketLens API Key (default: change-me-user)', accessKey || '');
      if (next === null) return;
      accessKey = next.trim();
      if (accessKey) {
        localStorage.setItem('marketlens_api_key', accessKey);
      } else {
        localStorage.removeItem('marketlens_api_key');
      }
    });

    async function loadSymbols() {
      try {
        const res = await api('/api/v1/market/summary?active=true');
        if (!res.ok) return;
        const data = await res.json();
        symbolSelect.innerHTML = '<option value="">-- Select symbol --</option>' +
          data.map(s => `<option value="${s.symbol}">${s.symbol} (${s.tradeDate})</option>`).join('');
      } catch (e) {
        // ignore
      }
    }

    function drawLine(canvas, points, color, label) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;
      ctx.clearRect(0,0,w,h);
      if (!points.length) return;
      const ys = points.map(p => p.y);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const spanY = maxY - minY || 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      points.forEach((p,i) => {
        const x = (i/(points.length-1)) * (w-20) + 10;
        const y = h - ((p.y - minY)/spanY) * (h-20) - 10;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = '12px Manrope';
      ctx.fillText(label, 12, 16);
    }

    function drawMacd(points) {
      const ctx = macdCanvas.getContext('2d');
      const w = macdCanvas.width = macdCanvas.clientWidth;
      const h = macdCanvas.height = macdCanvas.clientHeight;
      ctx.clearRect(0,0,w,h);
      if (!points.length) return;
      const macdVals = points.map(p => p.macd);
      const signalVals = points.map(p => p.signal);
      const histVals = points.map(p => p.histogram);
      const all = macdVals.concat(signalVals).concat(histVals);
      const minY = Math.min(...all);
      const maxY = Math.max(...all);
      const spanY = maxY - minY || 1;

      // Histogram bars
      histVals.forEach((yVal, i) => {
        const x = (i/(points.length-1)) * (w-20) + 10;
        const y = h - ((yVal - minY)/spanY) * (h-20) - 10;
        const zeroY = h - ((0 - minY)/spanY) * (h-20) - 10;
        ctx.fillStyle = yVal >= 0 ? 'rgba(16,185,129,0.6)' : '#f87171';
        ctx.fillRect(x-3, Math.min(y, zeroY), 6, Math.abs(zeroY - y));
      });

      const toLinePoints = (vals) => vals.map((y,i) => ({y, i}));
      const plotLine = (vals, color) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        vals.forEach((yVal,i) => {
          const x = (i/(vals.length-1)) * (w-20) + 10;
          const y = h - ((yVal - minY)/spanY) * (h-20) - 10;
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
      };
      plotLine(macdVals, '#10b981');
      plotLine(signalVals, '#60a5fa');
      ctx.fillStyle = '#10b981';
      ctx.font = '12px Manrope';
      ctx.fillText('MACD (green) / Signal (blue)', 12, 16);
    }

    function renderTable(data) {
      const rows = data.map(d => `
        <tr>
          <td>${d.tradeDate}</td>
          <td>${d.type}</td>
          <td>${Number(d.value).toFixed(4)}</td>
        </tr>
      `).join('');
      tableWrap.innerHTML = `
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Value</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadQuote(sym) {
      try {
        const res = await api(`/api/v1/market/summary?active=false`);
        const resActive = await api(`/api/v1/market/summary?active=true`);
        const dataInactive = res.ok ? await res.json() : [];
        const dataActive = resActive.ok ? await resActive.json() : [];
        const combined = [...dataActive, ...dataInactive];
        const row = combined.find(r => r.symbol === sym);
        if (row) {
          quoteEl.textContent = `Latest close (${row.tradeDate}): O ${Number(row.open).toFixed(2)} H ${Number(row.high).toFixed(2)} L ${Number(row.low).toFixed(2)} C ${Number(row.close).toFixed(2)} V ${row.volume.toLocaleString()}`;
          quoteEl.className = 'status';
        } else {
          quoteEl.textContent = '';
        }
      } catch {
        quoteEl.textContent = '';
      }
    }

    async function loadIndicators() {
      const sym = symbolSelect.value;
      if (!sym) {
        setStatus('Select a symbol.', true);
        return;
      }
      setStatus('Loading indicators...');
      loadBtn.disabled = true;
      try {
        await loadQuote(sym);
        const res = await api(`/api/v1/indicators/${encodeURIComponent(sym)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.length) {
          setStatus('No indicators found.', true);
          tableWrap.innerHTML = '';
          rsiCanvas.getContext('2d').clearRect(0,0,rsiCanvas.width,rsiCanvas.height);
          macdCanvas.getContext('2d').clearRect(0,0,macdCanvas.width,macdCanvas.height);
          return;
        }
        renderTable(data);
        const rsiPoints = data.filter(d => d.type === 'RSI_14').map((d,i) => ({y:Number(d.value), i}));
        drawLine(rsiCanvas, rsiPoints, '#10b981', 'RSI 14');
        const macdData = [];
        const byDate = {};
        data.forEach(d => {
          if (!byDate[d.tradeDate]) byDate[d.tradeDate] = {};
          byDate[d.tradeDate][d.type] = Number(d.value);
        });
        Object.entries(byDate).forEach(([,v]) => {
          if (v.MACD !== undefined && v.MACD_SIGNAL !== undefined && v.MACD_HISTOGRAM !== undefined) {
            macdData.push({macd:v.MACD, signal:v.MACD_SIGNAL, histogram:v.MACD_HISTOGRAM});
          }
        });
        drawMacd(macdData.slice(-120)); // plot recent
        setStatus(`Loaded ${data.length} rows for ${sym}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener('click', loadIndicators);
    loadSymbols();
  </script>
</body>
</html>
